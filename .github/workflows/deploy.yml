name: Deploy Backend

on:
  push:
    branches: [main, staging]

jobs:
  # ── Detect which services changed ─────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth:
              - 'services/auth/**'
              - 'shared/pkg/**'
            identity:
              - 'services/identity/**'
              - 'shared/pkg/**'
            catalogue:
              - 'services/catalogue/**'
              - 'shared/pkg/**'
            orders:
              - 'services/orders/**'
              - 'shared/pkg/**'
            storefront:
              - 'services/storefront/**'
              - 'shared/pkg/**'
            gateway:
              - 'services/gateway/**'

  # ── Deploy changed services to the matching Railway environment ────────────
  deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy ${{ matrix.service }} to ${{ github.ref_name == 'main' && 'production' || 'staging' }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          ENV="${{ github.ref_name == 'main' && 'production' || 'staging' }}"
          railway up \
            --service gomarketi-${{ matrix.service }} \
            --environment "$ENV" \
            --detach
          echo "✅ gomarketi-${{ matrix.service }} deployed to $ENV"
