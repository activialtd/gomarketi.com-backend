name: Backend CD Pipeline

on:
  push:
    branches:
      - staging
      - main

permissions:
  id-token: write   # required for AWS OIDC
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}   # e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com

jobs:
  # ── Detect which services changed ─────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            # Add one entry per service as you build them:
            # user-service:
            #   - 'services/user-service/**'
            # product-service:
            #   - 'services/product-service/**'
            # payment-service:
            #   - 'services/payment-service/**'

  # ── Build + Deploy changed services ───────────────────────────────────────
  deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS session
        run: aws sts get-caller-identity

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
          SERVICE: ${{ matrix.service }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/$SERVICE:$IMAGE_TAG
          docker build -t $IMAGE_URI ./services/$SERVICE
          docker push $IMAGE_URI
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Deploy to ECS Fargate
        env:
          IMAGE_URI: ${{ steps.build.outputs.image }}
          SERVICE: ${{ matrix.service }}
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
        run: |
          # Grab the current task definition, swap in the new image, register it
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $SERVICE \
            --query taskDefinition)

          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "$IMAGE_URI" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status,
                 .requiresAttributes, .compatibilities,
                 .registeredAt, .registeredBy)')

          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $SERVICE \
            --task-definition $NEW_TASK_ARN \
            --force-new-deployment

      - name: Wait for service to stabilize
        env:
          SERVICE: ${{ matrix.service }}
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $SERVICE
          echo "✅ $SERVICE deployed successfully"
